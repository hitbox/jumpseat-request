{% extends "base.html" %}


{% block content %}
    {# new block for admin stuff to go in #}
    <h3 class="center danger">Administration</h3>
    <h3>Object links</h3>
    <nav>
        <ul>{% for link in links %}
            <li>
                {% set url = url_for(link.endpoint) %}
                {{ render_link_with_current(url, link.name, link.current_for) }}
            </li>
        {% endfor %}</ul>
    </nav>
{% endblock %}
